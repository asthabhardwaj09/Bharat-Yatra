<nav>
  <div class="logo">
    <a (click)="navigateTo('/Home')">GanakGyan</a>
  </div>

  <!-- Responsive Toggle Button (linked to CSS) -->
  <div class="menu-toggle" (click)="toggleNavbar()">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <!-- Navigation Links -->
  <ul class="nav-links" [ngClass]="{ 'active': isMenuOpen }">

    <!-- Home -->
    <li class="dropdown" (mouseenter)="toggleDropdown('home')" (mouseleave)="toggleDropdown(null)">
      <button (click)="navigateTo('/Home')">Home</button>
      <ul *ngIf="activeDropdown === 'home'" class="dropdown-menu">
        <li><a (click)="navigateTo('/dashboard')">Dashboard</a></li>
        <li><a (click)="navigateTo('/NewUser')">New User</a></li>
      </ul>
    </li>

    <!-- About -->
    <li class="dropdown" (mouseenter)="toggleDropdown('about')" (mouseleave)="toggleDropdown(null)">
      <button (click)="navigateTo('/About')">About</button>
      <ul *ngIf="activeDropdown === 'about'" class="dropdown-menu">
        <li><a (click)="navigateTo('/team')">Team</a></li>
        <li><a (click)="navigateTo('/mission')">Mission</a></li>
      </ul>
    </li>

    <!-- Service -->
    <li class="dropdown" (mouseenter)="toggleDropdown('service')" (mouseleave)="toggleDropdown(null)">
      <button (click)="navigateTo('/Service')">Service</button>
      <ul *ngIf="activeDropdown === 'service'" class="dropdown-menu">
        <li><a (click)="navigateTo('/plan')">Plan</a></li>
        <li><a (click)="navigateTo('/support')">Support</a></li>
      </ul>
    </li>

    <!-- Contact -->
    <li class="dropdown" (mouseenter)="toggleDropdown('contact')" (mouseleave)="toggleDropdown(null)">
      <button (click)="navigateTo('/Contact')">Contact</button>
      <ul *ngIf="activeDropdown === 'contact'" class="dropdown-menu">
        <li><a (click)="navigateTo('/email')">Email</a></li>
        <li><a (click)="navigateTo('/call')">Call</a></li>
      </ul>
    </li>
  </ul>
</nav>
