<h2>Register</h2>
<form (ngSubmit)="onRegister()">
  <input type="email" name="email" [(ngModel)]="user.email" placeholder="Email" required /><br>
  <input type="password" name="password" [(ngModel)]="user.password" placeholder="Password" required /><br>
  <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" placeholder="Confirm Password" required /><br>
  <button type="submit">Register</button>
</form>

<p>Already have an account? <a routerLink="/login">Login here</a></p>
