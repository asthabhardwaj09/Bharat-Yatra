<div class="main-auth-container">
  <div class="auth-card-with-gif">
    
    <!-- Left GIF Section -->
    <div class="gif-section">
      <img src="assets/rath-yatra.gif" alt="Rath Yatra" />
    </div>

    <!-- Right Form Section -->
    <div class="form-section">

      <!-- 👋 Hello inside the form card now -->
      <div class="hello-text text-inside-form">
        <h1> Hello! 👋</h1>
        <p>Welcome to <strong>Rath Yatra</strong></p>
        <p class="sub-text">Enjoy the journey with us.</p>
      </div>

      <form (ngSubmit)="onSubmit()">
        <!-- Register Fields -->
        <ng-container *ngIf="!isLogin">
          <input type="text" placeholder="👤 First Name" [(ngModel)]="user.firstName" name="firstName" required />
          <input type="text" placeholder="👤 Last Name" [(ngModel)]="user.lastName" name="lastName" required />
          <input type="email" placeholder="📧 Email" [(ngModel)]="user.email" name="email" required />
          <input type="tel" placeholder="📱 Phone Number" [(ngModel)]="user.phone" name="phone" required />
          <input type="text" placeholder="🏠 Street" [(ngModel)]="user.address.street" name="street" required />
          <input type="text" placeholder="🏙️ City" [(ngModel)]="user.address.city" name="city" required />
          <input type="text" placeholder="🗺️ State" [(ngModel)]="user.address.state" name="state" required />
          <input type="text" placeholder="📮 Zip Code" [(ngModel)]="user.address.zipCode" name="zipCode" required />
          <input type="text" placeholder="🌍 Country" [(ngModel)]="user.address.country" name="country" required />
          <input type="password" placeholder="🔒 Password" [(ngModel)]="user.password" name="password" required />
          <input type="password" placeholder="🔁 Confirm Password" [(ngModel)]="confirmPassword" name="confirmPassword" required />
        </ng-container>

        <!-- Login Fields -->
        <ng-container *ngIf="isLogin">
          <input type="text" placeholder="📧 Email or 📱 Phone" [(ngModel)]="user.email" name="emailOrPhone" required />
          <input type="password" placeholder="🔒 Password" [(ngModel)]="user.password" name="password" required />
        </ng-container>

        <button type="submit">{{ isLogin ? 'Login 🚪' : 'Register 📩' }}</button>
      </form>

      <!-- Toggle Link -->
      <div class="toggle-link">
        <span *ngIf="isLogin">
          🆕 New user?
          <a href="#" (click)="toggleMode()" class="no-underline">Register</a>
        </span>
        <span *ngIf="!isLogin">
          🔁 Already registered?
          <a href="#" (click)="toggleMode()" class="no-underline">Login</a>
        </span>
      </div>

      <div class="brand-footer">© 2025 Rath Yatra ❤️</div>
    </div>
  </div>
</div>
